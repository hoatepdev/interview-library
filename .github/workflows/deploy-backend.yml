name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'
      - 'apps/backend/Dockerfile'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/interview-library-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/interview-library-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'docker-compose.prod.yml'
          target: '~/interview-library'

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/interview-library

            # Pull new image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/interview-library-backend:${{ github.sha }}

            # Update image tag in compose file to pinned sha
            sed -i "s|image: interview-library-backend:latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/interview-library-backend:${{ github.sha }}|g" docker-compose.prod.yml

            # Restart backend (zero-downtime: start new then stop old)
            docker compose -f docker-compose.prod.yml up -d --no-deps --pull never backend

            # Run TypeORM migrations using the compiled data-source
            docker compose -f docker-compose.prod.yml exec -T backend \
              node -e "
                const ds = require('./apps/backend/dist/database/data-source').default;
                ds.initialize()
                  .then(() => ds.runMigrations())
                  .then(migrations => { console.log('Ran', migrations.length, 'migration(s)'); process.exit(0); })
                  .catch(e => { console.error(e); process.exit(1); });
              "

            # Cleanup dangling images
            docker image prune -f
