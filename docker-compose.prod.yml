version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-library-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  backend:
    image: interview-library-backend:latest
    container_name: interview-library-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4000
    ports:
      - '4003:4000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
